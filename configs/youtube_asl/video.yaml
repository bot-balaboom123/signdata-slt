_base: _base/video.yaml

dataset: youtube_asl

pipeline:
  mode: video
  steps: [download, manifest, clip_video, webdataset]
  start_from: null
  stop_at: null

paths:
  root: dataset/youtube_asl
  videos: dataset/youtube_asl/videos
  transcripts: dataset/youtube_asl/transcripts
  manifest: dataset/youtube_asl/manifest.csv
  landmarks: ""
  normalized: ""
  clips: ""
  webdataset: ""

download:
  video_ids_file: assets/youtube-asl_youtube_asl_video_ids.txt
  languages: [en, ase, en-US, en-CA, en-GB, en-AU]
  format: "worstvideo[height>=720][fps>=23]/bestvideo[height>=480][height<720][fps>=23][fps<=61]/bestvideo[height>=480][height<=1080][fps>=14]"
  rate_limit: "5M"
  concurrent_fragments: 5

manifest:
  max_text_length: 300
  min_duration: 0.2
  max_duration: 60.0
