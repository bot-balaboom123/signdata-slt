_base: _base/pose_mediapipe.yaml

dataset: youtube_asl

pipeline:
  mode: pose
  steps: [download, manifest, extract, normalize, webdataset]
  start_from: null
  stop_at: null

paths:
  root: dataset/youtube_asl
  videos: dataset/youtube_asl/videos
  transcripts: dataset/youtube_asl/transcripts
  manifest: dataset/youtube_asl/manifest.csv
  landmarks: ""
  normalized: ""
  clips: ""
  webdataset: ""

download:
  video_ids_file: assets/youtube-asl_youtube_asl_video_ids.txt
  languages: [en, ase, en-US, en-CA, en-GB, en-AU]
  format: "worstvideo[height>=720][fps>=23]/bestvideo[height>=480][height<720][fps>=23][fps<=61]/bestvideo[height>=480][height<=1080][fps>=14]"
  rate_limit: "5M"
  concurrent_fragments: 5

manifest:
  max_text_length: 300
  min_duration: 0.2
  max_duration: 60.0

normalize:
  mode: xy_isotropic_z_minmax
  remove_z: false
  select_keypoints: true
  mask_empty_frames: true
  mask_low_confidence: false
  visibility_threshold: 0.3
  missing_value: -999.0
  keypoint_preset: mediapipe_553_to_85
