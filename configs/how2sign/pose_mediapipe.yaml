_base: _base/pose_mediapipe.yaml

dataset: how2sign

pipeline:
  mode: pose
  steps: [extract, normalize, webdataset]
  start_from: null
  stop_at: null

paths:
  root: dataset/how2sign
  videos: dataset/how2sign/videos
  manifest: dataset/how2sign/how2sign_realigned_val.csv
  landmarks: ""
  normalized: ""
  clips: ""
  webdataset: ""

normalize:
  mode: xy_isotropic_z_minmax
  remove_z: false
  select_keypoints: true
  mask_empty_frames: true
  mask_low_confidence: false
  visibility_threshold: 0.3
  missing_value: -999.0
  keypoint_preset: mediapipe_553_to_85
