name: "Privacy-Aware Video Pipeline"
description: >
  Compare standard vs. privacy-preserving video packaging for YouTube-ASL.
  The first job produces standard cropped video WebDataset shards.
  The second job adds face obfuscation before packaging.  Both use
  person detection and spatial cropping; run_name isolates artifacts.

jobs:
  # Standard video packaging (detection + cropping, no obfuscation)
  - config: jobs/youtube_asl/video.yaml
    overrides:
      run_name: standard_v1

  # Privacy-preserving packaging (detection + cropping + face blur)
  - config: jobs/youtube_asl/video.yaml
    overrides:
      run_name: privacy_v1
      stage_config.obfuscate.method: blur
