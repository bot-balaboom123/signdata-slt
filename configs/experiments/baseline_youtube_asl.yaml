name: "YouTube-ASL Baseline Reproduction"
description: >
  Reproduce the YouTube-ASL baseline results using both MediaPipe and
  MMPose extractors.  MediaPipe runs without target FPS resampling
  (as in the original paper); MMPose uses a second GPU.

jobs:
  - config: jobs/youtube_asl/mediapipe.yaml
    overrides:
      processing.target_fps: null
      processing.frame_skip: 1
      normalize.mask_empty_frames: true

  - config: jobs/youtube_asl/mmpose.yaml
    overrides:
      extractor.device: "cuda:1"
