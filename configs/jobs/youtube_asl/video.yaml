dataset:
  name: youtube_asl
  download: true
  manifest: true
  source:
    video_ids_file: assets/youtube-asl_youtube_asl_video_ids.txt
    languages: [en, ase, en-US, en-CA, en-GB, en-AU]
    download_format: "worstvideo[height>=720][fps>=23]/bestvideo[height>=480]"
    rate_limit: "5M"
    concurrent_fragments: 5
    max_text_length: 300
    min_duration: 0.2
    max_duration: 60.0
    text_processing:
      lowercase: false

processing:
  enabled: true
  processor: video2crop
  detection: yolo
  frame_skip: 2
  target_fps: 24.0
  max_workers: 4
  detection_config:
    model: yolov8n.pt
    device: cpu
    confidence_threshold: 0.5
  video_config:
    codec: libx264
    padding: 0.25

post_processing:
  enabled: false

output:
  enabled: true
  type: webdataset

run_name: default

paths:
  root: dataset/youtube_asl
