base: ../../base/datasets/youtube_asl.yaml

dataset:
  source:
    stop_on_transcript_block: true
    # transcript_proxy_http: http://user:pass@host:port
    # transcript_proxy_https: http://user:pass@host:port
    max_text_length: 300
    min_duration: 0.2
    max_duration: 60.0
    text_processing:
      lowercase: false

processing:
  enabled: true
  processor: video2crop
  detection: yolo
  sample_rate: 0.5
  max_workers: 4
  detection_config:
    model: yolo11m.pt
    device: cpu
    confidence_threshold: 0.5
    batch_size: 16
  video_config:
    codec: libx264
    padding: 0.0

post_processing:
  enabled: false

output:
  enabled: true
  type: webdataset

run_name: default

paths:
  root: dataset/youtube_asl
